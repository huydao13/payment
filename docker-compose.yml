services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres-data:/var/lib/postgresql/data
    ports: [ "5432:5432" ]

  order-service:
    image: ghcr.io/YOUR_GITHUB_USERNAME/order-service:latest
    build:
      context: .
      args:
        MODULE: order-service
    ports: ["8081:8081"]
    restart: unless-stopped

  payment-service:
    image: ghcr.io/YOUR_GITHUB_USERNAME/payment-service:latest
    build:
      context: .
      args:
        MODULE: payment-service
    ports: ["8082:8082"]
    restart: unless-stopped

  inventory-service:
    image: ghcr.io/YOUR_GITHUB_USERNAME/inventory-service:latest
    build:
      context: .
      args:
        MODULE: inventory-service
    ports: ["8083:8083"]
    restart: unless-stopped

  saga-orchestrator:
    image: ghcr.io/YOUR_GITHUB_USERNAME/saga-orchestrator:latest
    build:
      context: .
      args:
        MODULE: saga-orchestrator
    ports: ["8080:8080"]
    restart: unless-stopped
    environment:
      - ORDER_SERVICE_URL=http://order-service:8081
      - PAYMENT_SERVICE_URL=http://payment-service:8082
      - INVENTORY_SERVICE_URL=http://inventory-service:8083
    depends_on:
      - order-service
      - payment-service
      - inventory-service

volumes:
  postgres-data:
